name: Run DataFeedFromYahoo

on:
  schedule:
    # 1. Runs every 15 minutes from 13:30 UTC to 20:15 UTC, Monday through Friday.
    # This perfectly covers 9:30 AM to 4:15 PM EST (Live US Market Hours).
    - cron: '30/15 13 * * 1-5'
    - cron: '*/15 14-19 * * 1-5'
    - cron: '0,15 20 * * 1-5'
    
    # 2. Runs once at 13:00 UTC (9:00 AM EST) for pre-market database initialization.
    - cron: '0 13 * * 1-5'
  workflow_dispatch:      # Allows manual triggering

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Check out the repository code
    - name: Checkout code
      uses: actions/checkout@v4

    # Step 2: Set up Python environment
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'  # Adjust if your script requires a specific version

    # Step 3: Install dependencies
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f datafeedRequirement.txt ]; then pip install -r datafeedRequirement.txt; fi

    # Step 4: Set up Git credentials
    - name: Configure Git
      run: |
        git config --global user.name "GitHub Action"
        git config --global user.email "action@github.com"

    # Step 5: Run the Python script
    - name: Run Python script
      run: python DataFeedFromYahoo.py
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # For Git push authentication

    # Step 6: Commit and push changes to stocks.db
    - name: Commit and push changes
      run: |
        git add stocks.db
        git commit -m "Update stocks.db at $(date -u)" || echo "No changes to commit"
        git push origin main
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
